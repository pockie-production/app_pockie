name: app_pockie
description: A new Flutter project for POCKIE app.

publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  font_awesome_flutter: ^11.0.0
  dio: ^5.10.0
  shared_preferences: ^2.5.5
  intl: ^0.20.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: ABCOracle
      fonts:
        - asset: assets/fonts/ABCOracle-Regular-Trial.otf
        - asset: assets/fonts/ABCOracle-Medium-Trial.otf
          weight: 500
        - asset: assets/fonts/ABCOracle-Bold-Trial.otf
          weight: 700
